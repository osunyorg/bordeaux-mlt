[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/entreprises-partenariats/index.html"
to = "/entreprises/entreprises-partenariats/"

[[redirects]]
from = "/la-formation/candidature/index.html"
to = "/la-formation/candidater-en-but-mlt/"

[[redirects]]
from = "/agenda/2026/rentree-but-mlt-1ere-annee-1/index.html"
to = "/agenda/2026/rentree-but-mlt-3eme-annee/"

